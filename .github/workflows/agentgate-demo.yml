name: AgentGate demo

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  validate-agent-extension:
    name: Validate sample MCP server
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run AgentGate tests and demos
        run: npm test

      - name: Upload AgentGate reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agentgate-demo-reports
          path: |
            runs/latest/report.*
            runs/unsafe-demo/report.*
          if-no-files-found: error
